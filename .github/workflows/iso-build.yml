name: ISO Build

on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'Provisioner backend to build'
        type: string
        default: 'proxmox'
      engine:
        description: 'Blockchain engine to build'
        type: string
        default: 'evm'
      testing_mode:
        description: 'Build with --testing flag (SSH root login, apt proxy, testing marker)'
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

jobs:
  #
  # Dev builds — single ISO from workflow_dispatch inputs, on the self-hosted
  # blockhost-iso runner that has the Debian netinst cached + local apt-cacher.
  #
  build-dev:
    name: Dev ISO (${{ inputs.backend }}/${{ inputs.engine }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, blockhost-iso]
    env:
      BACKEND: ${{ inputs.backend || 'proxmox' }}
      ENGINE: ${{ inputs.engine || 'evm' }}
    steps:
      - uses: actions/checkout@v4
      - name: Init required submodules
        run: |
          ENGINE_SUB="blockhost-engine-${ENGINE}"
          if [ ! -d "$ENGINE_SUB" ] && [ -d "blockhost-engine" ]; then
            ENGINE_SUB="blockhost-engine"
          fi
          git submodule update --init blockhost-common "$ENGINE_SUB" blockhost-broker blockhost-monitor libpam-web3 facts
          git submodule update --init blockhost-provisioner-${{ env.BACKEND }}

      - name: Symlink base ISO from project directory
        run: |
          mkdir -p build
          if [ ! -f build/debian-12-netinst.iso ]; then
            ln -s /home/mwaddip/projects/blockhost/build/debian-12-netinst.iso build/debian-12-netinst.iso
          fi
          if [ ! -f build/debian-12-netinst.iso ]; then
            echo "Base Debian 12 netinst ISO not found"
            echo "Download it to: /home/mwaddip/projects/blockhost/build/"
            echo "https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/"
            exit 1
          fi

      - name: Build packages
        run: ./scripts/build-packages.sh --backend "$BACKEND" --engine "$ENGINE"

      - name: Verify packages
        run: ./scripts/ci-verify-packages.sh --backend "$BACKEND" --engine "$ENGINE"

      - name: Remove old ISO
        run: sudo rm -f build/blockhost_*.iso

      - name: Build ISO
        run: |
          ARGS="--backend $BACKEND --engine $ENGINE"
          if [ "${{ inputs.testing_mode }}" = "true" ]; then
            ARGS="$ARGS --testing --apt-proxy http://192.168.122.1:3142"
          fi
          sudo ./scripts/build-iso.sh $ARGS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockhost-iso-${{ env.BACKEND }}-${{ env.ENGINE }}
          path: build/blockhost_*.iso
          retention-days: 30

  #
  # Release builds — matrix of four libvirt ISOs, one per engine, on
  # ubuntu-latest. Attached to the GitHub Release for the tag.
  #
  build-release:
    name: Release ISO (libvirt/${{ matrix.engine }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        engine: [evm, opnet, cardano, ergo]
    env:
      BACKEND: libvirt
      ENGINE: ${{ matrix.engine }}
    steps:
      - uses: actions/checkout@v4

      - name: Init required submodules
        run: |
          # libpam-web3's .gitmodules uses SSH URLs (git@github.com:...) for its
          # chain plugin submodules. CI runners have no SSH key, so rewrite
          # SSH -> HTTPS transparently via git's insteadOf so anonymous access
          # works for public repos.
          git config --global url."https://github.com/".insteadOf "git@github.com:"

          git submodule update --init blockhost-common "blockhost-engine-${ENGINE}" blockhost-broker blockhost-monitor libpam-web3 facts
          git submodule update --init blockhost-provisioner-${BACKEND}
          # libpam-web3 hosts chain plugins as nested submodules at plugins/<chain>.
          # EVM is inline so nothing needed; OPNet/Cardano/Ergo must be initialized.
          case "$ENGINE" in
            opnet|cardano|ergo)
              git -C libpam-web3 submodule update --init "plugins/${ENGINE}"
              ;;
          esac
          # Cardano engine's packaging/build.sh lacks the git exec bit — set it
          # locally so the build script can invoke it. Harmless for engines
          # where it's already executable.
          chmod +x "blockhost-engine-${ENGINE}/packaging/build.sh" 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: libpam-web3
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: blockhost-monitor/go.sum
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev libpam0g-dev libssl-dev libclang-dev xorriso isolinux

      - name: Download base Debian 12 netinst ISO
        env:
          DEBIAN_VERSION: 12.12.0
        run: |
          mkdir -p build
          # Pin to a specific Debian 12 point release — cdimage.debian.org/.../current/
          # now points at Debian 13 (trixie), which our preseed / build-iso.sh
          # haven't been tested against. Bump DEBIAN_VERSION when a newer 12.x.x
          # ships and we want to pick it up.
          BASE=https://cdimage.debian.org/cdimage/archive/${DEBIAN_VERSION}/amd64/iso-cd
          FILE=debian-${DEBIAN_VERSION}-amd64-netinst.iso
          echo "Fetching ${BASE}/${FILE}"
          curl -fsSL -o build/debian-12-netinst.iso "${BASE}/${FILE}"

      - name: Build packages
        run: ./scripts/build-packages.sh --backend "$BACKEND" --engine "$ENGINE"

      - name: Verify packages
        run: ./scripts/ci-verify-packages.sh --backend "$BACKEND" --engine "$ENGINE"

      - name: Build ISO
        run: sudo ./scripts/build-iso.sh --backend "$BACKEND" --engine "$ENGINE"

      - name: Rename ISO with engine suffix
        run: |
          SRC=$(ls build/blockhost_*.iso | head -1)
          DEST="build/blockhost-${GITHUB_REF_NAME}-${BACKEND}-${ENGINE}.iso"
          sudo mv "$SRC" "$DEST"
          sudo chown $(id -u):$(id -g) "$DEST"

      - name: Upload ISO to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/blockhost-${{ github.ref_name }}-${{ env.BACKEND }}-${{ env.ENGINE }}.iso
          fail_on_unmatched_files: true
